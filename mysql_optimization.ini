# ============================================
# MySQL/MariaDB Optimization Configuration
# ============================================
# Add these settings to your my.ini file
# Location: C:\xampp2\mysql\bin\my.ini
# 
# IMPORTANT: 
# 1. Stop MySQL/MariaDB before editing
# 2. Add these under the [mysqld] section
# 3. Restart MySQL/MariaDB after saving
# ============================================

[mysqld]

# ============================================
# TIMEZONE CONFIGURATION
# ============================================
# Set default timezone to UTC (matches PHP)
default-time-zone = '+00:00'

# ============================================
# SQL MODE (Data Integrity)
# ============================================
# Enable strict mode to prevent silent data truncation
sql_mode = STRICT_TRANS_TABLES,NO_ZERO_IN_DATE,NO_ZERO_DATE,ERROR_FOR_DIVISION_BY_ZERO,NO_ENGINE_SUBSTITUTION

# ============================================
# INNODB BUFFER POOL (Performance)
# ============================================
# Increase buffer pool size for better performance
# Development: 512MB (recommended minimum)
# Production: 50-70% of available RAM
innodb_buffer_pool_size = 512M

# ============================================
# INNODB FLUSH LOG (Development Only)
# ============================================
# Set to 2 for faster writes in development
# IMPORTANT: Keep at 1 in production for data safety!
# 0 = flush every second (fastest, data loss risk)
# 1 = flush on every commit (slowest, full ACID - PRODUCTION)
# 2 = flush to OS cache on commit, write to disk every second (balanced for dev)
innodb_flush_log_at_trx_commit = 2

# ============================================
# CHARACTER SET & COLLATION
# ============================================
# Use utf8mb4 for full Unicode support
character-set-server = utf8mb4
collation-server = utf8mb4_unicode_ci

# ============================================
# ADDITIONAL PERFORMANCE SETTINGS
# ============================================
# Increase max connections if needed
max_connections = 150

# Query cache (if using MySQL 5.7 or earlier)
# Note: Removed in MySQL 8.0+
# query_cache_type = 1
# query_cache_size = 32M

# Increase table open cache
table_open_cache = 400

# Increase sort buffer
sort_buffer_size = 2M

# Increase read buffer
read_buffer_size = 1M
read_rnd_buffer_size = 2M

# ============================================
# LOGGING (Optional - for debugging)
# ============================================
# Uncomment to enable slow query log
# slow_query_log = 1
# slow_query_log_file = "C:/xampp2/mysql/data/slow-queries.log"
# long_query_time = 2

# ============================================
# NOTES
# ============================================
# After adding these settings:
# 1. Stop MySQL: xampp-control.exe -> Stop MySQL
# 2. Edit: C:\xampp2\mysql\bin\my.ini
# 3. Add settings under [mysqld] section
# 4. Start MySQL: xampp-control.exe -> Start MySQL
# 5. Verify: Run "SHOW VARIABLES LIKE 'innodb_buffer_pool_size';" in phpMyAdmin
# ============================================
