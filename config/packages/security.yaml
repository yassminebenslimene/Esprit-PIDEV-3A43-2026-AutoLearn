security:
    # https://symfony.com/doc/current/security.html#registering-the-user-hashing-passwords
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    # https://symfony.com/doc/current/security.html#loading-the-user-the-user-provider
    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false

        main:
            lazy: true
            provider: app_user_provider

            form_login:
                login_path: backoffice_login
                check_path: backoffice_login
                success_handler: App\Security\AuthenticationSuccessHandler  # ✅ Use custom handler
                
            logout:
                path: backoffice_logout
                target: backoffice_login 

    access_control:
        - { path: ^/backoffice, roles: ROLE_ADMIN }  # ✅ Seulement admin
        - { path: ^/login, roles: PUBLIC_ACCESS }
        - { path: ^/register, roles: PUBLIC_ACCESS }
        - { path: ^/home, roles: PUBLIC_ACCESS }    # ✅ Page d'accueil publique
        - { path: ^/$, roles: PUBLIC_ACCESS }   

when@test:
    security:
    password_hashers:
        App\Entity\User: 'auto'
        App\Entity\Admin: 'auto'
        App\Entity\Etudiant: 'auto'

    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false

        main:
            lazy: true
            provider: app_user_provider
            form_login:
                login_path: backoffice_login
                check_path: backoffice_login
                default_target_path: app_backoffice
                always_use_default_target_path: false
            logout:
                path: backoffice_logout
                target: backoffice_login

    access_control:
        - { path: ^/backoffice, roles: ROLE_ADMIN }
        - { path: ^/login, roles: PUBLIC_ACCESS }
        - { path: ^/register, roles: PUBLIC_ACCESS }
        - { path: ^/home, roles: PUBLIC_ACCESS }
        - { path: ^/$, roles: PUBLIC_ACCESS }