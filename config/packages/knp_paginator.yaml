knp_paginator:
    page_range: 5                       # Nombre de pages affichées dans la pagination
    default_options:
        page_name: page                 # Nom du paramètre de page dans l'URL
        sort_field_name: sort           # Nom du paramètre de tri
        sort_direction_name: direction  # Nom du paramètre de direction
        distinct: true                  # Assure des résultats uniques
        filter_field_name: filterField  # Nom du paramètre de filtre
        filter_value_name: filterValue  # Valeur du filtre
    template:
        pagination: '@KnpPaginator/Pagination/twitter_bootstrap_v4_pagination.html.twig'
        sortable: '@KnpPaginator/Pagination/sortable_link.html.twig'
        filtration: '@KnpPaginator/Pagination/filtration.html.twig'
