# Configuration du bundle VichUploader pour gérer les uploads de fichiers
vich_uploader:
    db_driver: orm
    
    mappings:
        # Mapping pour les images des posts (communauté)
        post_images:
            uri_prefix: /uploads/images
            upload_destination: '%kernel.project_dir%/public/uploads/images'
            namer: Vich\UploaderBundle\Naming\SmartUniqueNamer

        # Mapping pour les vidéos des posts (communauté)
        post_videos:
            uri_prefix: /uploads/videos
            upload_destination: '%kernel.project_dir%/public/uploads/videos'
            namer: Vich\UploaderBundle\Naming\SmartUniqueNamer
        
        # Mapping pour les images des quiz
        quiz_images:
            uri_prefix: /uploads/quiz/images
            upload_destination: '%kernel.project_dir%/public/uploads/quiz/images'
            namer: Vich\UploaderBundle\Naming\SmartUniqueNamer
            inject_on_load: false
            delete_on_update: true
            delete_on_remove: true
        
        # Mapping pour les images des questions
        question_images:
            uri_prefix: /uploads/questions/images
            upload_destination: '%kernel.project_dir%/public/uploads/questions/images'
            namer: Vich\UploaderBundle\Naming\SmartUniqueNamer
            inject_on_load: false
            delete_on_update: true
            delete_on_remove: true
        
        # Mapping pour les fichiers audio des questions
        question_audio:
            uri_prefix: /uploads/questions/audio
            upload_destination: '%kernel.project_dir%/public/uploads/questions/audio'
            namer: Vich\UploaderBundle\Naming\SmartUniqueNamer
            inject_on_load: false
            delete_on_update: true
            delete_on_remove: true
        
        # Mapping pour les fichiers vidéo des questions
        question_video:
            uri_prefix: /uploads/questions/video
            upload_destination: '%kernel.project_dir%/public/uploads/questions/video'
            namer: Vich\UploaderBundle\Naming\SmartUniqueNamer
            inject_on_load: false
            delete_on_update: true
            delete_on_remove: true
