# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
    uploads_dir: '%kernel.project_dir%/public/uploads'

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones
    
    # Configuration du WeatherService avec la clé API
    App\Service\WeatherService:
        arguments:
            $weatherApiKey: '%env(WEATHER_API_KEY)%'

    # Configuration des services AI avec Hugging Face
    App\Service\AIReportService:
        arguments:
            $huggingfaceApiKey: '%env(HUGGINGFACE_API_KEY)%'
            $huggingfaceModel: '%env(HUGGINGFACE_MODEL)%'
    
    App\Service\FeedbackAnalyticsService:
        arguments: []

    # Configuration Groq Service
    App\Service\GroqService:
        arguments:
            $httpClient: '@http_client'
            $logger: '@logger'
            $groqApiKey: '%env(GROQ_API_KEY)%'
            $groqApiUrl: '%env(GROQ_API_URL)%'
            $groqModel: '%env(GROQ_MODEL)%'

    # Language Detector Service (no arguments needed)
    App\Service\LanguageDetectorService: ~

    # AI Assistant Service
    App\Service\AIAssistantService:
        arguments:
            $groqService: '@App\Service\GroqService'
            $ragService: '@App\Service\RAGService'
            $languageDetector: '@App\Service\LanguageDetectorService'
            $actionExecutor: '@App\Service\ActionExecutorService'
            $logger: '@logger'
            $security: '@security.helper'
